server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo real (BrowserRouter de React
    # Router) cae a index.html para que el ruteo lo resuelva el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
